  title: 'B2: Dedup on write — embedding similarity + merge (ISS-003)'
  status: done
  description: |-
    ISS-003 升级完成。merge_memory_into() 从简单的 importance=MAX + access_log 升级为智能合并：
    1. Content evolution — 新内容 >30% 更长时替换旧内容
