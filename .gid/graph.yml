- id: cluster-scaling
  title: 'Cluster Discovery Scaling: VP-tree ANN + Incremental Clustering'
  status: done
  description: '让 discover_clusters 从百条级扩展到十万条级。VP-tree ANN 补齐 embedding pair discovery 盲点，Hot/Warm/Cold 三层增量聚类避免全量 recluster。设计文档: DESIGN-cluster-scaling.md'
  tags:
  - performance
  - scaling
  - clustering
  priority: 10
  type: feature
- id: cs-vptree
  title: VP-tree implementation + ANN pair discovery
  status: done
  description: 在 cluster.rs 内实现 VpTree struct (~80行 Rust，零依赖)。L2 distance on normalized embeddings。build O(n log n), query_k_nearest O(log n) amortized。Step 3 增加 ANN pairs source：对每个候选记忆找 k 个 embedding 最近邻加入 candidate_pairs。k = sqrt(n).clamp(5, 30)。修复当前盲点：embedding signal 只在 scoring 用，不参与 pair discovery。
  tags:
  - ann
  - vp-tree
  - performance
  priority: 10
- id: cs-refactor-inner
  title: Refactor discover_clusters_inner extraction
  status: done
  description: 把 discover_clusters() 核心逻辑 (Step 2-6) 提取到 discover_clusters_inner()。discover_clusters() 和新的 discover_clusters_subset() 共享内部实现。避免代码重复。全量测试不 regress。
  tags:
  - refactor
  priority: 20
- id: cs-storage
  title: Storage tables + API for cluster state persistence
  status: done
  description: '新增 3 张 SQLite 表: cluster_state, cluster_assignments, cluster_centroids。在 Storage 上实现全套 CRUD: init_cluster_tables(), get_cluster_centroids(), assign_to_cluster(), update_centroid_incremental(), mark_cluster_dirty(), get_dirty_cluster_ids(), add_pending_memory(), get_pending_memory_ids(), get_cluster_members(), replace_clusters(), get_memories_by_ids(), clear_pending_and_dirty()。单元测试覆盖。'
  tags:
  - storage
  - sqlite
  priority: 20
- id: cs-hot-path
  title: 'Hot path: assign new memory to nearest cluster'
  status: done
  description: '实现 assign_new_memory(): 新记忆进来 → 加载 cluster centroids → 找最近 centroid (cosine sim) → 超过 hot_assign_threshold (0.6) 归入 cluster + 增量更新 centroid → 否则加入 pending。O(C) 复杂度。on_memory_added() hook 集成到 add() 路径。'
  tags:
  - incremental
  - hot-path
  priority: 30
- id: cs-warm-path
  title: 'Warm path: recluster dirty clusters + pending memories'
  status: done
  description: '实现 recluster_dirty(): 取 dirty cluster IDs + pending memory IDs → 收集所有相关记忆 → 调 discover_clusters_subset() 局部 Infomap → 更新 assignments + centroids → 清除 dirty/pending 标记。触发条件: 每 100 条新增或 consolidate() 调用时。O(m log m) where m << n。'
  tags:
  - incremental
  - warm-path
  priority: 40
- id: cs-consolidate
  title: Cold path + consolidate() integration
  status: done
  description: '改造 consolidate(): 三层判断 — pending 超 20% → cold (全量 recluster), pending > 0 → warm (局部 recluster), 否则用缓存 clusters。Cold path = 现有 discover_clusters() 不变。集成 hot/warm/cold 选择逻辑。全量 regression 测试 + benchmark (模拟 1000/5000/10000 条记忆)。'
  tags:
  - integration
  - consolidate
  priority: 50
