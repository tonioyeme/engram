  status: done
  description: |
    在 rustclaw/src/engram_hooks.rs 的 EngramStoreHook 加 content-level 过滤：
    - HEARTBEAT_OK → 直接跳过
    - NO_REPLY → 直接跳过
    - 系统指令特征检测（"你是 RustClaw"、"Read SOUL.md"、tool call 格式等）→ 跳过
    - Heartbeat 有实质内容的响应 → 保留让 extractor 正常处理
    约 30 行改动。不需要 ritual。
